apiVersion: v1
kind: Service
metadata:
  name: {{ include "greenhouse.fullname" . }}-backend
  labels:
    {{- include "greenhouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "greenhouse.selectorLabels" (dict "root" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
