{{- range .Values.httpRoutes }}
{{- if .enabled }}
{{- $root := $ }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  labels:
    {{- include "greenhouse.labels" $ | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .parentRefs | nindent 4 }}
  {{- with .hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .backend }}
      backendRefs:
        - name: {{ include "greenhouse.fullname" $root }}-{{ .backend }}
          port: {{ if .port }}{{ .port }}{{ else if eq .backend "backend" }}{{ $root.Values.backend.service.port }}{{ else }}{{ $root.Values.frontend.service.port }}{{ end }}
          weight: 1
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
