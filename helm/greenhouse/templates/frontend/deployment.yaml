apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "greenhouse.fullname" . }}-frontend
  labels:
    {{- include "greenhouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "greenhouse.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "greenhouse.selectorLabels" (dict "root" . "component" "frontend") | nindent 8 }}
    spec:
      {{- include "greenhouse.imagePullSecrets" (dict "secrets" .Values.frontend.imagePullSecrets) | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: {{ include "greenhouse.image" (dict "root" . "image" .Values.frontend.image) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "greenhouse.fullname" . }}-frontend-config
                  key: API_URL
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
