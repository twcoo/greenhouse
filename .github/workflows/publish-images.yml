name: Publish Images

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (e.g. v1.2.3)'
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          fi

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: greenhouse
          POSTGRES_PASSWORD: greenhouse
          POSTGRES_DB: greenhouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key-not-used-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_COOKIE_SECURE: "False"
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      TEST_DB_HOST: localhost
      DB_HOST: localhost
      DB_USER: greenhouse
      DB_PASSWORD: greenhouse
      DB_NAME: greenhouse
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: make lint-backend

      - name: Run tests
        run: make test-backend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: make lint-frontend

      - name: Run tests
        run: make test-frontend

  publish-backend:
    needs: [prepare, test-backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        run: make build-backend REGISTRY=ghcr.io/twcoo IMAGE_TAG=${{ needs.prepare.outputs.image_tag }}

      - name: Push latest tag
        run: |
          docker tag ghcr.io/twcoo/greenhouse-backend:${{ needs.prepare.outputs.image_tag }} ghcr.io/twcoo/greenhouse-backend:latest
          docker push ghcr.io/twcoo/greenhouse-backend:latest

  publish-frontend:
    needs: [prepare, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        run: make build-frontend REGISTRY=ghcr.io/twcoo IMAGE_TAG=${{ needs.prepare.outputs.image_tag }}

      - name: Push latest tag
        run: |
          docker tag ghcr.io/twcoo/greenhouse-frontend:${{ needs.prepare.outputs.image_tag }} ghcr.io/twcoo/greenhouse-frontend:latest
          docker push ghcr.io/twcoo/greenhouse-frontend:latest
