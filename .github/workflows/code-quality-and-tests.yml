name: Code Quality and Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'pnpm-lock.yaml'
      - 'package.json'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'pnpm-lock.yaml'
      - 'package.json'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pyproject.toml'
              - 'uv.lock'
            frontend:
              - 'frontend/**'
              - 'pnpm-lock.yaml'
              - 'package.json'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: greenhouse
          POSTGRES_PASSWORD: greenhouse
          POSTGRES_DB: greenhouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-not-used-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_COOKIE_SECURE: "False"
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      TEST_DB_HOST: localhost
      DB_HOST: localhost
      DB_USER: greenhouse
      DB_PASSWORD: greenhouse
      DB_NAME: greenhouse

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: make lint-backend

      - name: Run tests
        run: make test-backend

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: make lint-frontend

      - name: Run tests
        run: make test-frontend
