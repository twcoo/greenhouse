name: Code Quality and Tests

on:
  push:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: greenhouse
          POSTGRES_PASSWORD: greenhouse
          POSTGRES_DB: greenhouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-not-used-in-production
      BACKEND_TEST_DB_HOST: localhost
      BACKEND_DB_USER: greenhouse
      BACKEND_DB_PASSWORD: greenhouse
      BACKEND_DB_NAME: greenhouse

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: make lint-backend

      - name: Run tests
        run: make test-backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: make lint-frontend

      - name: Run tests
        run: make test-frontend
