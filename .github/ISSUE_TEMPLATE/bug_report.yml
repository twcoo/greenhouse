name: Bug Report
description: Report a bug in Greenhouse
title: '[Bug] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: Affected area
      options:
        - label: Frontend
        - label: Backend
        - label: Helm/Infra

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, or anything else relevant.
    validations:
      required: false
