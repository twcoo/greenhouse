name: Feature Request
description: Suggest a new feature for Greenhouse
title: '[Feature] '
labels: ['enhancement']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What problem does this solve and what would you like to see?
    validations:
      required: true

  - type: checkboxes
    id: area
    attributes:
      label: Affected area
      options:
        - label: Frontend
        - label: Backend
        - label: Helm/Infra

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or anything else relevant.
    validations:
      required: false
